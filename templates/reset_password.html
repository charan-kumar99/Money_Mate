<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Money Mate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #141824 50%, #1e2330 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 217, 184, 0.1) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(77, 171, 247, 0.1) 0%, transparent 70%);
            animation: float 25s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .reset-card {
            background: rgba(20, 24, 36, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 2px solid rgba(0, 217, 184, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 100px rgba(0, 217, 184, 0.1);
            position: relative;
            overflow: hidden;
        }
        .reset-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #00d9b8, #4dabf7);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 3rem;
            background: linear-gradient(135deg, #00d9b8 0%, #4dabf7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            display: block;
        }
        .logo h2 {
            background: linear-gradient(135deg, #00d9b8 0%, #4dabf7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin: 0;
            font-size: 2rem;
            letter-spacing: -1px;
        }
        .logo p {
            color: #8891a8;
            font-size: 0.95rem;
            margin-top: 10px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group-text {
            background: rgba(0, 217, 184, 0.1);
            border: 2px solid rgba(0, 217, 184, 0.2);
            border-right: none;
            border-radius: 15px 0 0 15px;
            padding: 12px 16px;
        }
        .input-group-text i {
            color: #00d9b8;
            font-size: 1.2rem;
        }
        .form-control {
            background: rgba(30, 35, 48, 0.8);
            border: 2px solid rgba(0, 217, 184, 0.2);
            border-left: none;
            color: #fff;
            border-radius: 0 15px 15px 0;
            padding: 12px 18px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control::placeholder {
            color: #8891a8;
        }
        .form-control:focus {
            background: rgba(30, 35, 48, 1);
            border-color: #00d9b8;
            box-shadow: 0 0 0 5px rgba(0, 217, 184, 0.1);
            color: #fff;
            outline: none;
        }
        .btn-submit {
            background: linear-gradient(135deg, #00d9b8 0%, #4dabf7 100%);
            border: none;
            border-radius: 15px;
            padding: 14px;
            font-weight: 700;
            width: 100%;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 5px 25px rgba(0, 217, 184, 0.3);
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 217, 184, 0.5);
        }
        .alert {
            border-radius: 15px;
            border: none;
            margin-bottom: 25px;
            padding: 15px 20px;
            font-weight: 500;
        }
        .alert-danger {
            background: rgba(255, 107, 157, 0.15);
            color: #ff6b9d;
            border-left: 4px solid #ff6b9d;
        }
        .alert-success {
            background: rgba(0, 217, 184, 0.15);
            color: #00d9b8;
            border-left: 4px solid #00d9b8;
        }
        .info-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .info-box i {
            color: #10b981;
            margin-right: 10px;
        }
        .info-box p {
            color: #94a3b8;
            margin: 0;
            font-size: 0.9rem;
        }
        .password-strength {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }
        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #10b981; width: 100%; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="logo">
                <i class="fas fa-lock-open"></i>
                <h2>Reset Password</h2>
                <p>Create a new secure password</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="info-box">
                <i class="fas fa-check-circle"></i>
                <p>OTP verified! Now set your new password.</p>
            </div>

            <form method="POST" id="resetForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" 
                               name="new_password" 
                               id="newPassword"
                               class="form-control" 
                               placeholder="New Password" 
                               minlength="6"
                               required 
                               autofocus>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" 
                               name="confirm_password" 
                               id="confirmPassword"
                               class="form-control" 
                               placeholder="Confirm Password" 
                               minlength="6"
                               required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-submit">
                    <i class="fas fa-save me-2"></i>Reset Password
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strengthBar');
        const form = document.getElementById('resetForm');

        // Password strength indicator
        newPassword.addEventListener('input', function() {
            const password = this.value;
            const strength = calculateStrength(password);
            
            strengthBar.className = 'password-strength-bar';
            if (strength === 'weak') {
                strengthBar.classList.add('strength-weak');
            } else if (strength === 'medium') {
                strengthBar.classList.add('strength-medium');
            } else if (strength === 'strong') {
                strengthBar.classList.add('strength-strong');
            }
        });

        function calculateStrength(password) {
            if (password.length < 6) return 'weak';
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;
            
            if (strength <= 1) return 'weak';
            if (strength <= 2) return 'medium';
            return 'strong';
        }

        // Validate passwords match
        form.addEventListener('submit', function(e) {
            if (newPassword.value !== confirmPassword.value) {
                e.preventDefault();
                alert('Passwords do not match!');
                confirmPassword.focus();
            }
        });
    </script>
</body>
</html>

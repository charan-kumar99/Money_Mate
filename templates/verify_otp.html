<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Money Mate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #141824 50%, #1e2330 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 217, 184, 0.1) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(77, 171, 247, 0.1) 0%, transparent 70%);
            animation: float 25s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }
        .verify-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .verify-card {
            background: rgba(20, 24, 36, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 2px solid rgba(0, 217, 184, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 100px rgba(0, 217, 184, 0.1);
            position: relative;
            overflow: hidden;
        }
        .verify-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #00d9b8, #4dabf7);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 3rem;
            background: linear-gradient(135deg, #00d9b8 0%, #4dabf7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            display: block;
        }
        .logo h2 {
            background: linear-gradient(135deg, #00d9b8 0%, #4dabf7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin: 0;
            font-size: 2rem;
            letter-spacing: -1px;
        }
        .logo p {
            color: #8891a8;
            font-size: 0.95rem;
            margin-top: 10px;
        }
        .otp-input {
            background: rgba(30, 35, 48, 0.8);
            border: 2px solid rgba(0, 217, 184, 0.2);
            color: #fff;
            border-radius: 15px;
            padding: 18px;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 20px;
        }
        .otp-input::placeholder {
            color: #8891a8;
            letter-spacing: normal;
            font-size: 1rem;
        }
        .otp-input:focus {
            background: rgba(30, 35, 48, 1);
            border-color: #00d9b8;
            box-shadow: 0 0 0 5px rgba(0, 217, 184, 0.1);
            color: #fff;
            outline: none;
        }
        .btn-submit {
            background: linear-gradient(135deg, #00d9b8 0%, #4dabf7 100%);
            border: none;
            border-radius: 15px;
            padding: 14px;
            font-weight: 700;
            width: 100%;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 5px 25px rgba(0, 217, 184, 0.3);
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 217, 184, 0.5);
        }
        .back-link {
            text-align: center;
            margin-top: 25px;
            color: #8891a8;
            font-size: 1rem;
        }
        .back-link a {
            color: #00d9b8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-link a:hover {
            color: #4dabf7;
        }
        .alert {
            border-radius: 15px;
            border: none;
            margin-bottom: 25px;
            padding: 15px 20px;
            font-weight: 500;
        }
        .alert-danger {
            background: rgba(255, 107, 157, 0.15);
            color: #ff6b9d;
            border-left: 4px solid #ff6b9d;
        }
        .alert-success {
            background: rgba(0, 217, 184, 0.15);
            color: #00d9b8;
            border-left: 4px solid #00d9b8;
        }
        .info-box {
            background: rgba(77, 171, 247, 0.1);
            border: 1px solid rgba(77, 171, 247, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .info-box i {
            color: #4dabf7;
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }
        .info-box p {
            color: #94a3b8;
            margin: 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-card">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <h2>Verify OTP</h2>
                <p>Enter the 6-digit code sent to your email</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="info-box">
                <i class="fas fa-envelope-open-text"></i>
                <p>Check your email inbox for the OTP code</p>
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <input type="text" 
                       name="otp" 
                       class="otp-input" 
                       placeholder="Enter 6-digit OTP" 
                       maxlength="6" 
                       pattern="[0-9]{6}"
                       required 
                       autofocus
                       inputmode="numeric">
                
                <button type="submit" class="btn btn-submit">
                    <i class="fas fa-check-circle me-2"></i>Verify OTP
                </button>
            </form>
            
            <div class="back-link">
                <a href="{{ url_for('forgot_password') }}"><i class="fas fa-arrow-left me-2"></i>Request New OTP</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-format OTP input
        const otpInput = document.querySelector('.otp-input');
        otpInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
